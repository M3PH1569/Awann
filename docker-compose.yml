version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetmanagement_app
    restart: always
    ports:
      - "8080:80"
    environment:
      - CI_ENVIRONMENT=production
      - database.default.hostname=db
      - database.default.database=assetmanage
      - database.default.username=postgres
      - database.default.password=postgres_password
      - database.default.port=5432
    depends_on:
      - db
    volumes:
      - ./:/var/www/html:ro
      - ./writable:/var/www/html/writable:rw

  db:
    image: postgres:15
    container_name: assetmanagement_db
    restart: always
    environment:
      - POSTGRES_DB=assetmanage
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
